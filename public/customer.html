<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoanAssist</title>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --green-border: #bbf7d0;
      --red: #dc2626;
      --red-border: #fecaca;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 38px; height: 38px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 2px 8px rgba(37,99,235,0.3);
    }
    .logo-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub { font-size: 11px; color: var(--text-muted); }

    /* Agent card */
    .agent-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      transition: all 0.4s;
    }

    .agent-card.ai { background: var(--primary-light); border-color: #bfdbfe; }
    .agent-card.human { background: var(--green-light); border-color: var(--green-border); }

    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: white;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.4s;
    }

    .avatar.ai { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(37,99,235,0.08); }
    .avatar.human { border-color: #86efac; box-shadow: 0 0 0 4px rgba(22,163,74,0.08); }

    .agent-name { font-size: 15px; font-weight: 600; }
    .agent-desc { font-size: 13px; color: var(--text-secondary); text-align: center; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      background: white; border: 1px solid var(--border);
    }

    .pill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
    }
    .pill-dot.ai { background: var(--primary); animation: pulse 1.8s infinite; }
    .pill-dot.human { background: var(--green); animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }

    /* Transcript */
    .transcript {
      background: #fafbfc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      height: 160px;
      overflow-y: auto;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transcript::-webkit-scrollbar { width: 3px; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .t-msg { display: flex; flex-direction: column; gap: 1px; }
    .t-label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .t-label.ai { color: var(--primary); }
    .t-label.human { color: var(--green); }
    .t-text { font-size: 12px; color: var(--text); line-height: 1.5; }
    .t-system { font-size: 11px; color: var(--text-muted); font-style: italic; text-align: center; }

    /* Handoff notice */
    .handoff-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--green-light);
      border: 1px solid var(--green-border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--green);
      font-weight: 500;
    }
    .handoff-banner.visible { display: flex; }

    /* Buttons */
    .btn-stack { display: flex; flex-direction: column; gap: 8px; }

    button {
      width: 100%; padding: 12px;
      border-radius: 10px; border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }

    .btn-primary {
      background: var(--primary); color: white;
      box-shadow: 0 1px 3px rgba(37,99,235,0.3);
    }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-outline {
      background: white; color: var(--red);
      border: 1.5px solid var(--red-border);
    }
    .btn-outline:hover:not(:disabled) { background: #fef2f2; }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Debug */
    #debugLog {
      font-family: monospace; font-size: 10px;
      color: var(--text-muted); background: #fafbfc;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px; max-height: 70px; overflow-y: auto;
    }

    audio { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <div class="logo-icon">💰</div>
      <div>
        <div class="logo-name">LoanAssist</div>
        <div class="logo-sub">AI-Powered Loan Service</div>
      </div>
    </div>

    <div class="agent-card" id="agentCard">
      <div class="avatar" id="avatar">🤖</div>
      <div class="agent-name" id="agentName">AI Loan Assistant</div>
      <div class="agent-desc" id="agentDesc">Ready to help with your loan application</div>
      <div class="status-pill" id="statusPill">
        <div class="pill-dot" id="pillDot"></div>
        <span id="pillText">Waiting to connect</span>
      </div>
    </div>

    <div class="transcript" id="transcript">
      <div class="t-system">— Transcript will appear here —</div>
    </div>

    <div class="handoff-banner" id="handoffBanner">
      🔄 Transferring to a human agent, please hold...
    </div>

    <div class="btn-stack">
      <button class="btn-primary" id="joinBtn" onclick="joinCall()">Join Call</button>
      <button class="btn-outline" id="endBtn" onclick="endCall()" disabled>End Call</button>
    </div>

    <div id="debugLog">Connecting...</div>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>

  <script>
    const socket = io();
    let pc = null;
    let localStream = null;
    let iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function log(msg) {
      const d = document.getElementById('debugLog');
      const line = document.createElement('div');
      line.textContent = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ' + msg;
      d.appendChild(line);
      d.scrollTop = d.scrollHeight;
    }

    fetch('/ice-config').then(r => r.json()).then(cfg => { iceConfig = cfg; log('ICE config ready ✓'); }).catch(() => log('STUN only'));

    socket.emit('register-customer');
    socket.on('call-state', ({ state }) => updateUI(state));

    socket.on('handoff-triggered', ({ reason }) => {
      addT('system', `Handoff: ${reason}`);
      const b = document.getElementById('handoffBanner');
      b.classList.add('visible');
      setTimeout(() => b.classList.remove('visible'), 6000);
    });

    socket.on('call-ended', () => { addT('system', 'Call ended'); cleanup(); });
    socket.on('chat-message', ({ text, role }) => addT(role, text));

    socket.on('answer', async ({ sdp }) => {
      log('Got answer ✓');
      try { await pc.setRemoteDescription(new RTCSessionDescription(sdp)); }
      catch(e) { log('Answer err: ' + e.message); }
    });

    socket.on('ice-candidate', async ({ candidate }) => {
      if (pc && candidate) {
        try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
      }
    });

    socket.on('agent-ready', async () => {
      log('Agent ready — resending offer');
      if (pc && localStream) await sendOffer();
    });

    async function joinCall() {
      try {
        log('Requesting mic...');
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        log('Mic granted ✓');

        pc = new RTCPeerConnection(iceConfig);

        pc.onicecandidate = e => {
          if (e.candidate) socket.emit('ice-candidate', { target: 'agent', candidate: e.candidate });
        };

        pc.oniceconnectionstatechange = () => {
          const state = pc.iceConnectionState;
          log('ICE: ' + state);
          if (state === 'disconnected') {
            log('Disconnected — attempting ICE restart...');
            setTimeout(async () => {
              if (pc && pc.iceConnectionState === 'disconnected') {
                try {
                  const offer = await pc.createOffer({ iceRestart: true });
                  await pc.setLocalDescription(offer);
                  socket.emit('offer', { target: 'agent', sdp: pc.localDescription });
                  log('ICE restart offer sent');
                } catch(e) { log('ICE restart failed: ' + e.message); }
              }
            }, 2000);
          }
          if (state === 'failed') {
            log('Connection failed — rejoining...');
            cleanup();
          }
        };
        pc.onconnectionstatechange = () => log('Conn: ' + pc.connectionState);

        pc.ontrack = e => {
          log('Remote audio ✓');
          const a = document.getElementById('remoteAudio');
          a.srcObject = e.streams[0];
          a.play().catch(err => log('Play blocked: ' + err.message));
        };

        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        document.getElementById('joinBtn').disabled = true;
        document.getElementById('endBtn').disabled = false;
        addT('system', 'You joined the call');
        socket.emit('start-call');
        await sendOffer();
      } catch(err) {
        log('Error: ' + err.message);
        alert('Mic access needed: ' + err.message);
      }
    }

    async function sendOffer() {
      log('Sending offer...');
      const offer = await pc.createOffer({ offerToReceiveAudio: true });
      await pc.setLocalDescription(offer);
      socket.emit('offer', { target: 'agent', sdp: pc.localDescription });
      log('Offer sent ✓');
    }

    function endCall() { socket.emit('end-call'); cleanup(); }

    function cleanup() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (pc) pc.close();
      pc = null; localStream = null;
      document.getElementById('joinBtn').disabled = false;
      document.getElementById('endBtn').disabled = true;
      updateUI('idle');
    }

    function updateUI(state) {
      const card = document.getElementById('agentCard');
      const avatar = document.getElementById('avatar');
      const agentName = document.getElementById('agentName');
      const agentDesc = document.getElementById('agentDesc');
      const dot = document.getElementById('pillDot');
      const pillText = document.getElementById('pillText');

      if (state === 'ai-active') {
        card.className = 'agent-card ai';
        avatar.className = 'avatar ai'; avatar.textContent = '🤖';
        agentName.textContent = 'AI Loan Assistant';
        agentDesc.textContent = 'Processing your loan application';
        dot.className = 'pill-dot ai'; pillText.textContent = 'Connected to AI Agent';
      } else if (state === 'human-active') {
        card.className = 'agent-card human';
        avatar.className = 'avatar human'; avatar.textContent = '👤';
        agentName.textContent = 'Human Loan Advisor';
        agentDesc.textContent = 'A specialist is now assisting you';
        dot.className = 'pill-dot human'; pillText.textContent = 'Connected to Human Agent';
      } else {
        card.className = 'agent-card';
        avatar.className = 'avatar'; avatar.textContent = '🤖';
        agentName.textContent = 'AI Loan Assistant';
        agentDesc.textContent = 'Ready to help with your loan application';
        dot.className = 'pill-dot'; pillText.textContent = 'Waiting to connect';
      }
    }

    function addT(role, text) {
      const t = document.getElementById('transcript');
      const wrap = document.createElement('div');
      if (role === 'system') {
        wrap.className = 't-system'; wrap.textContent = text;
      } else {
        wrap.className = 't-msg';
        const labels = { ai: 'AI Agent', human: 'Human Agent', customer: 'You' };
        wrap.innerHTML = `<div class="t-label ${role}">${labels[role]||role}</div><div class="t-text">${text}</div>`;
      }
      t.appendChild(wrap); t.scrollTop = t.scrollHeight;
    }
  </script>
</body>
</html>
